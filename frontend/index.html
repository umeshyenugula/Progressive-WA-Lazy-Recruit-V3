<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sign In — Club Recruitments</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-page">

  <div id="offline-setup-overlay" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(255,255,255,.86);z-index:99999;">
    <div style="width:min(420px,92vw);text-align:center;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:28px 22px;box-shadow:0 16px 40px rgba(0,0,0,.08);">
      <div class="spinner" style="margin:0 auto 14px;"></div>
      <h2 style="margin:0 0 8px;font-size:1.1rem;color:#111827;font-family:var(--font-body);font-weight:700;">Preparing Offline Mode</h2>
      <p id="offline-setup-msg" style="margin:0;color:#6b7280;font-size:.9rem;">Downloading data...</p>
    </div>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <!-- Shield / Club icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25v3a3 3 0 0 0-3 3v6.75a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3v-6.75a3 3 0 0 0-3-3v-3c0-2.9-2.35-5.25-5.25-5.25Zm3.75 8.25v-3a3.75 3.75 0 1 0-7.5 0v3h7.5Z" clip-rule="evenodd" />
        </svg>
      </div>
      <h1>CSI EB Club Recruitment</h1>
      <p>Sign in to manage your recruitment pipeline</p>
    </div>

    <div id="login-error" class="login-error" role="alert" aria-live="assertive">
      <div class="login-error-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22Z" clip-rule="evenodd"/>
        </svg>
      </div>
      <div class="login-error-body">
        <div class="login-error-title">Sign-in failed</div>
        <div class="login-error-msg" id="login-error-msg"></div>
      </div>
    </div>

    <form class="login-form" id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-icon-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path d="M3 4a2 2 0 0 0-2 2v1.161l8.441 4.221a1.25 1.25 0 0 0 1.118 0L19 7.162V6a2 2 0 0 0-2-2H3Z"/>
            <path d="m19 8.839-7.77 3.885a2.75 2.75 0 0 1-2.46 0L1 8.839V14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.839Z"/>
          </svg>
          <input type="email" id="email" name="email"
                 placeholder="you@example.com" autocomplete="email" required />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-icon-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 7a5 5 0 0 1 9.192-2.706.75.75 0 1 1-1.31.736 3.5 3.5 0 1 0 .6 3.287.75.75 0 1 1 1.435.44A5 5 0 0 1 8 7Zm7.75 4.75a.75.75 0 0 1 .75.75v.5a.75.75 0 0 1-1.5 0v-.5a.75.75 0 0 1 .75-.75Zm.75 3.5a.75.75 0 0 0-1.5 0v.5a.75.75 0 0 0 1.5 0v-.5Z" clip-rule="evenodd"/>
            <path d="M2 9.75A.75.75 0 0 1 2.75 9h10.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 9.75Z"/>
          </svg>
          <input type="password" id="password" name="password"
                 placeholder="••••••••" autocomplete="current-password" required />
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-login" id="btn-login">
        Sign in
      </button>
    </form>

    <p class="login-footer">Club Recruitment Management System</p>
  </div>

  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const setupOverlay = document.getElementById('offline-setup-overlay');
    const setupMsg = document.getElementById('offline-setup-msg');
    function goToDashboard(user) {
      window.location.href = user.role === 'superadmin'
        ? 'superadmin/dashboard.html'
        : 'admin/dashboard.html';
    }

    window.addEventListener('crm:offline-setup-progress', (ev) => {
      setupOverlay.style.display = 'flex';
      if (ev?.detail?.message) setupMsg.textContent = ev.detail.message;
    });

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('login-error');
      const errMsg   = document.getElementById('login-error-msg');
      const btn      = document.getElementById('btn-login');

      errEl.classList.remove('show');
      setLoading(btn, true, 'Signing in…');

      try {
        setupOverlay.style.display = 'flex';
        const user = await Auth.login(email, password);
        setupOverlay.style.display = 'none';
        toast('Welcome back!', 'success', 2500);
        goToDashboard(user);
      } catch (err) {
        setupOverlay.style.display = 'none';
        // Humanise common backend messages
        let msg = err.message || 'Something went wrong. Please try again.';
        if (/invalid.*credential|wrong.*password|password.*incorrect/i.test(msg))
          msg = 'Incorrect email or password. Please try again.';
        else if (/user.*not.*found|no.*account/i.test(msg))
          msg = 'No account found with that email address.';
        else if (/network|server/i.test(msg))
          msg = 'Cannot reach the server. Check your connection and try again.';

        errMsg.textContent = msg;
        errEl.classList.add('show');

        // Shake the form fields to signal failure
        const form = document.getElementById('login-form');
        form.style.animation = 'none';
        requestAnimationFrame(() => {
          form.style.animation = 'loginShake 400ms var(--ease)';
        });

        setLoading(btn, false, 'Sign in');
      }
    });
  </script>
</body>
</html>
