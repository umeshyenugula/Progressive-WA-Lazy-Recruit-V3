<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Candidates — Admin</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/tables.css" />
  <style>
    /* ── Profile & Domain Section ─────────────────────────── */
    .cand-profile { display:flex;align-items:center;gap:var(--sp-4);padding:var(--sp-4);background:var(--bg-secondary);border-radius:var(--radius);margin-bottom:var(--sp-4); }
    .cand-profile-avatar { width:56px;height:56px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:1.3rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .cand-profile-info h4 { margin:0 0 .25rem;font-size:1.05rem; }
    .cand-profile-info p { margin:0;font-size:.82rem;color:var(--text-muted); }
    .cand-detail-grid { display:grid;grid-template-columns:1fr 1fr;gap:.8rem 2rem; }
    .cand-detail-grid .full-col { grid-column:1/-1; }
    .detail-label { font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.15rem; }
    .detail-value { font-size:.9rem;color:var(--text); }
    .detail-value.empty { color:var(--text-muted);font-style:italic; }
    /* ── Domain Manager ───────────────────────────────────── */
    .domain-manager { border:1px solid var(--border);border-radius:var(--radius);overflow:hidden; }
    .domain-manager-header { display:flex;align-items:center;justify-content:space-between;padding:var(--sp-3) var(--sp-4);background:var(--bg-secondary);border-bottom:1px solid var(--border); }
    .domain-manager-header h5 { margin:0;font-size:.88rem; }
    .domain-row { display:flex;align-items:center;justify-content:space-between;padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--border);transition:background .15s; }
    .domain-row:last-child { border-bottom:none; }
    .domain-row:hover { background:var(--bg-secondary); }
    .domain-row-left { display:flex;align-items:center;gap:var(--sp-3); }
    .domain-dot { width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0; }
    .domain-row-name { font-size:.88rem;font-weight:500; }
    .add-domain-row { display:flex;gap:var(--sp-2);padding:var(--sp-3) var(--sp-4);background:var(--bg-secondary); }
    .add-domain-row select { flex:1;font-size:.85rem; }
    /* ── Eval Section ─────────────────────────────────────── */
    .section-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-3); }
    .section-header h4 { margin:0;font-size:.95rem; }
    .domain-eval-block { border:1px solid var(--border);border-radius:var(--radius);margin-bottom:var(--sp-4);overflow:hidden; }
    .domain-eval-header { display:flex;align-items:center;justify-content:space-between;padding:var(--sp-3) var(--sp-4);background:var(--bg-secondary);border-bottom:1px solid var(--border); }
    .domain-eval-header-left { display:flex;align-items:center;gap:var(--sp-2); }
    .domain-eval-title { font-weight:700;font-size:.9rem; }
    .domain-eval-body { padding:var(--sp-4); }
    .criteria-score-row { display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:var(--sp-3);margin-bottom:var(--sp-3); }
    .criteria-label { font-size:.85rem;color:var(--text-muted); }
    .criteria-slider { width:100%;accent-color:var(--accent); }
    .score-display { min-width:2.5rem;text-align:center;font-weight:700;font-size:1rem;color:var(--accent); }
    .eval-meta { font-size:.75rem;color:var(--text-muted);margin-top:var(--sp-2); }
    .score-bar { height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:3px; }
    .score-bar-fill { height:100%;border-radius:3px;background:var(--accent);transition:width .3s; }
    /* ── Prev eval cards ──────────────────────────────────── */
    .prev-eval-card { background:var(--bg-secondary);border-radius:var(--radius-sm);padding:var(--sp-3);margin-bottom:var(--sp-2); }
    .prev-eval-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-2); }
    .prev-eval-admin { display:flex;align-items:center;gap:var(--sp-2);font-size:.83rem; }
    .prev-eval-avatar { width:24px;height:24px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-weight:700;font-size:.65rem;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .prev-eval-score { font-weight:700;font-size:.85rem;color:var(--accent);white-space:nowrap; }
    .prev-eval-remarks { font-size:.8rem;color:var(--text-muted);font-style:italic;border-left:3px solid var(--border);padding-left:.6rem;margin-top:.4rem;line-height:1.5; }
    .section-divider { border:none;border-top:1px solid var(--border);margin:var(--sp-4) 0; }
    .extra-data-table { width:100%;font-size:.8rem;border-collapse:collapse; }
    .extra-data-table td { padding:.3rem .4rem;border-bottom:1px solid var(--border); }
    .extra-data-table td:first-child { color:var(--text-muted);font-weight:500;width:40%; }
    /* ── Add candidate form ───────────────────────────────── */
    .form-grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3); }
    .form-grid-2 .span-2 { grid-column:1/-1; }
    @media(max-width:640px){.cand-detail-grid,.form-grid-2{grid-template-columns:1fr;}}
    /* modal wider */
    .modal-xl { max-width:780px; }
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-placeholder"></div>

  <header class="topbar">
    <span class="topbar-title">All Candidates</span>
    <div class="topbar-actions">
      <button class="btn btn-outline-blue btn-sm js-network-required" id="btn-upload-server">Upload to Server</button>
      <button class="btn btn-outline-red btn-sm js-network-required" id="btn-refresh-cache">Refresh</button>
      <button class="btn btn-outline-blue btn-sm" id="btn-export-backup">Export Copy</button>
      <button class="btn btn-primary btn-sm" onclick="openModal('modal-add-candidate')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="15" height="15">
          <path d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z"/>
        </svg>
        Add Candidate
      </button>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1>Candidates</h1>
        <p id="candidate-count">Loading…</p>
      </div>
    </div>

    <div class="filter-bar">
      <div class="search-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search name, email, roll no…" />
      </div>
      <select id="filter-domain"><option value="">All Domains</option></select>
      <select id="filter-status">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="shortlisted">Shortlisted</option>
        <option value="selected">Selected</option>
        <option value="rejected">Rejected</option>
      </select>
      <select id="filter-eval">
        <option value="">All Evaluations</option>
        <option value="evaluated">Evaluated by me</option>
        <option value="not-evaluated">Not evaluated yet</option>
      </select>
      <div class="spacer"></div>
      <button class="btn btn-ghost btn-sm" id="btn-clear">Clear</button>
    </div>

    <div class="table-wrap" id="candidates-table">
      <div class="loading-overlay"><div class="spinner"></div><span>Loading…</span></div>
    </div>
    <div id="pagination" style="margin-top:var(--sp-3)"></div>
  </main>
</div>

<!-- ═══════════════════════════════════════ Add Candidate ════ -->
<div class="modal-backdrop hidden" id="modal-add-candidate">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>Add Candidate</h3>
      <button class="modal-close" onclick="closeModal('modal-add-candidate')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid-2">
        <div class="form-group span-2">
          <label>Full Name <span style="color:var(--danger)">*</span></label>
          <input type="text" id="add-name" placeholder="e.g. Rahul Sharma" />
        </div>
        <div class="form-group">
          <label>Email <span style="color:var(--danger)">*</span></label>
          <input type="email" id="add-email" placeholder="rahul@example.com" />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="add-phone" placeholder="+91 98765 43210" />
        </div>
        <div class="form-group">
          <label>Roll Number</label>
          <input type="text" id="add-roll" placeholder="21PA1A0001" />
        </div>
        <div class="form-group">
          <label>Branch</label>
          <input type="text" id="add-branch" placeholder="CSE / ECE / MECH…" />
        </div>
        <div class="form-group">
          <label>Section</label>
          <input type="text" id="add-section" placeholder="A / B / C" />
        </div>
        <div class="form-group">
          <label>Year</label>
          <select id="add-year">
            <option value="">Select year</option>
            <option value="1">1st Year</option>
            <option value="2">2nd Year</option>
            <option value="3">3rd Year</option>
            <option value="4">4th Year</option>
          </select>
        </div>
        <div class="form-group span-2">
          <label>Skills</label>
          <input type="text" id="add-skills" placeholder="Python, React, ML…" />
        </div>
        <div class="form-group span-2">
          <label>Experience / Background</label>
          <textarea id="add-experience" rows="3" placeholder="Previous projects, clubs, internships…"></textarea>
        </div>
        <div class="form-group span-2">
          <label>Assign to Domain(s)</label>
          <select id="add-domain-select" multiple style="min-height:80px;">
          </select>
          <span class="form-hint">Hold Ctrl/Cmd to select multiple</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-candidate')">Cancel</button>
      <button class="btn btn-primary" id="btn-add-candidate">Add Candidate</button>
    </div>
  </div>
</div>

<!-- ═════════════════════════════ Candidate Detail + Eval ════ -->
<div class="modal-backdrop hidden" id="modal-view">
  <div class="modal modal-xl">
    <div class="modal-header">
      <div>
        <h3 id="view-title">Candidate</h3>
        <div id="view-subtitle" style="font-size:.8rem;color:var(--text-muted);margin-top:.15rem;"></div>
      </div>
      <div style="display:flex;gap:var(--sp-2);align-items:center;">
        <button class="btn btn-primary btn-sm" id="btn-open-eval">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
            <path d="M13.586 3.586a2 2 0 1 1 2.828 2.828l-.793.793-2.828-2.828.793-.793ZM11.379 5.793 3 14.172V17h2.828l8.38-8.379-2.83-2.828Z"/>
          </svg>
          Evaluate
        </button>
        <button class="modal-close" onclick="closeModal('modal-view')">✕</button>
      </div>
    </div>
    <div class="modal-body" id="view-body">
      <div class="loading-overlay"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════ Evaluate Modal ════ -->
<div class="modal-backdrop hidden" id="modal-eval">
  <div class="modal modal-xl">
    <div class="modal-header">
      <div>
        <h3 id="eval-title">Evaluate Candidate</h3>
        <div id="eval-subtitle" style="font-size:.8rem;color:var(--text-muted);margin-top:.15rem;"></div>
      </div>
      <button class="modal-close" onclick="closeModal('modal-eval')">✕</button>
    </div>
    <div class="modal-body" id="eval-body">
      <div class="loading-overlay"><div class="spinner"></div></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-eval')">Cancel</button>
      <button class="btn btn-ghost" id="btn-next-domain">Next Domain</button>
      <button class="btn btn-primary" id="btn-submit-eval">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="15" height="15">
          <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd"/>
        </svg>
        Save All Evaluations
      </button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/sidebar.js"></script>
<script>
const user = requireAuth(['admin', 'superadmin']);
mountSidebar('admin');
initSidebarUser();
highlightNav();

const PAGE_SIZE = 15;
let allCandidates = [], filteredCandidates = [], allDomains = [];
let criteriaByDomain = {};   // domain_id -> [criteria]
let criteriaMap = {};        // criteria_id -> criteria obj
let currentPage = 1, sortKey = 'name', sortDir = 'asc';

// Currently open candidate in eval/view modal
let viewingCandidate = null;
let currentEvalCandidate = null;
let currentEvalIndex = 0;
let currentEvalDrafts = {};

function getCandidateEvalDomains(candidate) {
  const byId = new Map();
  (candidate.candidate_domains || []).forEach(cd => {
    byId.set(String(cd.domain_id), cd);
  });

  (candidate.evaluations || []).forEach(ev => {
    const domainId = String(ev.domain_id || '');
    if (!domainId || byId.has(domainId)) return;
    const domainMeta = (allDomains || []).find(d => String(d.id) === domainId);
    byId.set(domainId, {
      domain_id: domainId,
      domains: domainMeta ? { id: domainMeta.id, name: domainMeta.name } : null,
      inferred_from_evaluation: true,
    });
  });

  return [...byId.values()];
}

// ── Bootstrap ──────────────────────────────────────────────────
async function loadData() {
  try {
    const [candidates, domains] = await Promise.all([Candidates.list(), Domains.list()]);
    allCandidates = candidates;
    allDomains    = domains;

    // Populate domain filter & add-candidate select
    const filterSel = document.getElementById('filter-domain');
    const addSel    = document.getElementById('add-domain-select');
    filterSel.innerHTML = '<option value="">All Domains</option>';
    addSel.innerHTML = '';
    domains.forEach(d => {
      filterSel.innerHTML += `<option value="${d.id}">${esc(d.name)}</option>`;
      addSel.innerHTML    += `<option value="${d.id}">${esc(d.name)}</option>`;
    });

    // Load criteria for every domain in parallel, cache result
    const critPairs = await Promise.all(domains.map(d => Domains.criteria(d.id).then(c => [d.id, c])));
    criteriaByDomain = Object.fromEntries(critPairs);
    criteriaMap = {};
    critPairs.forEach(([, crits]) => crits.forEach(c => { criteriaMap[c.id] = c; }));

    applyFilters();
  } catch (err) { toast(err.message, 'error'); }
}

// ── Filters ────────────────────────────────────────────────────
function applyFilters() {
  const search  = document.getElementById('search-input').value.trim().toLowerCase();
  const domain  = document.getElementById('filter-domain').value;
  const status  = document.getElementById('filter-status').value;
  const evalFil = document.getElementById('filter-eval').value;

  filteredCandidates = allCandidates.filter(c => {
    if (search && !`${c.name} ${c.email} ${c.roll_number}`.toLowerCase().includes(search)) return false;
    if (status && c.status !== status) return false;
    if (domain) {
      if (!(c.candidate_domains || []).some(cd => cd.domain_id === domain)) return false;
    }
    if (evalFil) {
      const hasMyEval = (c.evaluations || []).some(e => String(e.admin_id) === String(user.id));
      if (evalFil === 'evaluated'     && !hasMyEval) return false;
      if (evalFil === 'not-evaluated' &&  hasMyEval) return false;
    }
    return true;
  });

  filteredCandidates = sortData(filteredCandidates, sortKey, sortDir);
  currentPage = 1;
  renderTable();
}

// ── Table ──────────────────────────────────────────────────────
function renderTable() {
  const el    = document.getElementById('candidates-table');
  const pager = paginate(filteredCandidates, currentPage, PAGE_SIZE);

  document.getElementById('candidate-count').textContent =
    `${filteredCandidates.length} candidate${filteredCandidates.length !== 1 ? 's' : ''}`;

  if (!pager.items.length) {
    renderEmpty(el, 'No candidates', 'Adjust filters or add a new candidate');
    renderPagination(document.getElementById('pagination'), { total:0,pages:0,page:1,size:PAGE_SIZE }, ()=>{});
    return;
  }

  const rows = pager.items.map(c => {
    const myEvals = (c.evaluations || []).filter(e => String(e.admin_id) === String(user.id));
    const domainsAssigned = c.candidate_domains || [];
    const domainTags = domainsAssigned
      .map(cd => `<span class="badge badge-admin" style="font-size:.7rem;">${esc(cd.domains?.name || '?')}</span>`)
      .join('') || '<span class="muted" style="font-size:.78rem;">None</span>';

    // My eval summary — total across all domains
    const myTotal = myEvals.reduce((s, e) => s + (e.total_score || 0), 0);
    const evalBadge = myEvals.length
      ? `<span class="badge badge-selected">✓ ${myTotal} pts · ${myEvals.length} domain${myEvals.length>1?'s':''}</span>`
      : `<span class="badge badge-pending">Not evaluated</span>`;

    return `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:var(--sp-3);">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${avatar(c.name)}</div>
          <div>
            <div style="font-weight:600;font-size:.88rem;">${esc(c.name)}</div>
            <div class="muted" style="font-size:.74rem;">${esc(c.email)}</div>
          </div>
        </div>
      </td>
      <td class="muted" style="font-size:.82rem;">${esc(c.roll_number || '—')}</td>
      <td class="muted" style="font-size:.82rem;">${esc(c.branch || '—')}${c.section?' / '+esc(c.section):''}</td>
      <td><div style="display:flex;flex-wrap:wrap;gap:3px;">${domainTags}</div></td>
      <td>${badgeHtml(c.status)}</td>
      <td>${evalBadge}</td>
      <td class="col-actions">
        <div class="table-actions">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="openView('${c.id}')" title="View profile">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/>
              <path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41Z" clip-rule="evenodd"/>
            </svg>
          </button>
          <button class="btn btn-primary btn-sm" onclick="openEval('${c.id}')">
            ${myEvals.length ? 'Edit Eval' : 'Evaluate'}
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table>
    <thead><tr>
      <th class="sortable" data-key="name">Candidate</th>
      <th class="sortable" data-key="roll_number">Roll No</th>
      <th class="sortable" data-key="branch" class="col-hide-mobile">Branch</th>
      <th>Domains</th>
      <th class="sortable" data-key="status">Status</th>
      <th>My Evaluations</th>
      <th>Actions</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  el.querySelectorAll('th.sortable').forEach(th => {
    th.style.cursor = 'pointer';
    if (th.dataset.key === sortKey) th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    th.addEventListener('click', () => {
      sortDir = (sortKey === th.dataset.key) ? (sortDir === 'asc' ? 'desc' : 'asc') : 'asc';
      sortKey = th.dataset.key;
      applyFilters();
    });
  });

  renderPagination(document.getElementById('pagination'), pager, p => { currentPage = p; renderTable(); });
}

// ── View Modal ─────────────────────────────────────────────────
async function openView(id) {
  document.getElementById('view-title').textContent = 'Loading…';
  document.getElementById('view-subtitle').textContent = '';
  document.getElementById('view-body').innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
  document.getElementById('btn-open-eval').onclick = () => { closeModal('modal-view'); openEval(id); };
  openModal('modal-view');

  try {
    const c = await Candidates.get(id);
    viewingCandidate = c;
    renderViewModal(c);
  } catch (err) {
    document.getElementById('view-body').innerHTML = `<p class="muted">${esc(err.message)}</p>`;
  }
}

function renderViewModal(c) {
  document.getElementById('view-title').textContent = c.name;
  document.getElementById('view-subtitle').innerHTML =
    `${badgeHtml(c.status)} <span style="margin-left:6px;color:var(--text-muted)">Added ${fmtDate(c.created_at)}</span>`;

  const candDomainIds = new Set((c.candidate_domains || []).map(cd => cd.domain_id));
  const extraEntries  = Object.entries(c.extra_data || {}).filter(([,v]) => v !== null && v !== '');

  // ── Domain manager section
  const domainRows = (c.candidate_domains || []).map(cd => `
    <div class="domain-row" id="drow-${cd.domain_id}">
      <div class="domain-row-left">
        <div class="domain-dot"></div>
        <span class="domain-row-name">${esc(cd.domains?.name || cd.domain_id)}</span>
      </div>
      <button class="btn btn-ghost btn-sm" style="color:var(--danger);font-size:.75rem;"
        onclick="removeDomain('${c.id}','${cd.domain_id}',this)" title="Remove from this domain">
        Remove
      </button>
    </div>`).join('') || `<div style="padding:var(--sp-3) var(--sp-4);font-size:.83rem;color:var(--text-muted);">No domains assigned yet</div>`;

  // Domains not yet assigned — for the add dropdown
  const availableDomains = allDomains.filter(d => !candDomainIds.has(d.id));
  const addRow = availableDomains.length ? `
    <div class="add-domain-row">
      <select id="new-domain-sel-${c.id}">
        <option value="">Add to domain…</option>
        ${availableDomains.map(d => `<option value="${d.id}">${esc(d.name)}</option>`).join('')}
      </select>
      <button class="btn btn-primary btn-sm" onclick="addDomain('${c.id}')">Assign</button>
    </div>` : `<div class="add-domain-row" style="font-size:.8rem;color:var(--text-muted);">All domains assigned</div>`;

  // ── Per-domain evaluations (all evals grouped by domain)
  const evals = c.evaluations || [];
  const evalsByDomain = {};
  evals.forEach(ev => {
    if (!evalsByDomain[ev.domain_id]) evalsByDomain[ev.domain_id] = [];
    evalsByDomain[ev.domain_id].push(ev);
  });

  const evalDomains = getCandidateEvalDomains(c);
  const evalSections = evalDomains.map(cd => {
    const domEvals = evalsByDomain[cd.domain_id] || [];
    const domCriteria = criteriaByDomain[cd.domain_id] || [];
    const evalCards = domEvals.map(ev => {
      const adminName = ev.users?.full_name || ev.users?.email || 'Unknown Admin';
      const isMe = String(ev.admin_id) === String(user.id);
      const allScores = ev.scores || {};
      const specialKeys = new Set(['overall_rating', 'final_general_remarks']);
      const scoreItems = Object.entries(allScores)
        .filter(([cid]) => !specialKeys.has(cid))
        .map(([cid, score]) => {
          const cr = criteriaMap[cid];
          const numericScore = Number(score);
          if (cr && Number.isFinite(numericScore) && Number(cr.max_score) > 0) {
            const pct = Math.max(0, Math.min(100, Math.round((numericScore / Number(cr.max_score)) * 100)));
            return `<div style="display:flex;align-items:center;gap:var(--sp-2);font-size:.8rem;margin-bottom:.35rem;">
              <span style="flex:1;color:var(--text-muted);">${esc(cr.name)}</span>
              <div style="flex:2;display:flex;align-items:center;gap:.4rem;">
                <div class="score-bar" style="flex:1;"><div class="score-bar-fill" style="width:${pct}%"></div></div>
                <span style="min-width:44px;text-align:right;color:var(--text-muted);">${numericScore}/${cr.max_score}</span>
              </div>
            </div>`;
          }
          return `<div style="display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2);font-size:.8rem;margin-bottom:.35rem;">
            <span style="color:var(--text-muted);">${esc(cid)}</span>
            <strong>${esc(score)}</strong>
          </div>`;
        }).join('');
      const overallRating = allScores?.overall_rating ?? ev.total_score;
      const overallLine = overallRating != null
        ? `<div style="display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2);font-size:.8rem;margin-bottom:.35rem;">
            <span style="color:var(--text-muted);">Overall Rating</span>
            <strong>${esc(overallRating)}</strong>
          </div>`
        : '';
      const finalGeneralRemarks = allScores?.final_general_remarks
        ? `<div class="prev-eval-remarks">${esc(allScores.final_general_remarks)}</div>`
        : '';
      return `<div class="prev-eval-card">
        <div class="prev-eval-header">
          <div class="prev-eval-admin">
            <div class="prev-eval-avatar">${avatar(adminName)}</div>
            <strong>${esc(adminName)}</strong>
            ${isMe ? `<span class="badge badge-admin" style="font-size:.65rem;">You</span>` : ''}
            <span class="muted" style="font-size:.75rem;">· ${fmtDate(ev.updated_at)}</span>
          </div>
          <div class="prev-eval-score">${ev.total_score} pts</div>
        </div>
        ${scoreItems || overallLine}
        ${finalGeneralRemarks}
        ${ev.remarks ? `<div class="prev-eval-remarks">"${esc(ev.remarks)}"</div>` : ''}
      </div>`;
    }).join('');

    const noCriteria = domCriteria.length === 0
      ? `<p class="muted" style="font-size:.82rem;margin:0;">No criteria defined for this domain.</p>` : '';

    return `<div class="domain-eval-block">
      <div class="domain-eval-header">
        <div class="domain-eval-header-left">
          <div class="domain-dot"></div>
          <span class="domain-eval-title">${esc(cd.domains?.name || cd.domain_id)}</span>
        </div>
        <span class="muted" style="font-size:.78rem;">${domEvals.length} eval${domEvals.length !== 1 ? 's' : ''} · ${domCriteria.length} criteria</span>
      </div>
      <div class="domain-eval-body">
        ${noCriteria}
        ${evalCards || `<p class="muted" style="font-size:.82rem;margin:0;">No evaluations yet for this domain.</p>`}
      </div>
    </div>`;
  }).join('') || `<p class="muted">Assign this candidate to a domain to see evaluations.</p>`;

  document.getElementById('view-body').innerHTML = `
    <!-- Profile strip -->
    <div class="cand-profile">
      <div class="cand-profile-avatar">${avatar(c.name)}</div>
      <div class="cand-profile-info">
        <h4>${esc(c.name)}</h4>
        <p>${esc(c.email)} ${c.phone ? '· ' + esc(c.phone) : ''}</p>
        <p>${c.branch ? esc(c.branch) : ''}${c.section ? ' / ' + esc(c.section) : ''}${c.year ? ' · Year ' + esc(c.year) : ''}</p>
      </div>
    </div>

    <!-- Details grid -->
    <div class="cand-detail-grid" style="margin-bottom:var(--sp-4);">
      <div>
        <div class="detail-label">Roll Number</div>
        <div class="detail-value ${!c.roll_number?'empty':''}">${esc(c.roll_number||'Not provided')}</div>
      </div>
      <div>
        <div class="detail-label">Status</div>
        <div class="detail-value">${badgeHtml(c.status)}</div>
      </div>
      <div class="full-col">
        <div class="detail-label">Skills</div>
        <div class="detail-value ${!c.skills?'empty':''}">${esc(c.skills||'Not provided')}</div>
      </div>
      <div class="full-col">
        <div class="detail-label">Experience</div>
        <div class="detail-value ${!c.experience?'empty':''}">${esc(c.experience||'Not provided')}</div>
      </div>
      ${extraEntries.length ? `<div class="full-col">
        <div class="detail-label" style="margin-bottom:.5rem;">Extra Data</div>
        <table class="extra-data-table">
          ${extraEntries.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(String(v))}</td></tr>`).join('')}
        </table>
      </div>` : ''}
    </div>

    <!-- Domain manager -->
    <hr class="section-divider">
    <div class="section-header">
      <h4>Domains <span class="muted" style="font-size:.8rem;font-weight:400;">(${(c.candidate_domains||[]).length})</span></h4>
    </div>
    <div class="domain-manager" id="domain-manager-${c.id}">
      ${domainRows}
      ${addRow}
    </div>

    <!-- Evaluations by domain -->
    <hr class="section-divider">
    <div class="section-header">
      <h4>Evaluations by Domain</h4>
      <button class="btn btn-primary btn-sm" onclick="closeModal('modal-view');openEval('${c.id}')">
        ${evals.some(e => String(e.admin_id) === String(user.id)) ? 'Edit My Evaluations' : 'Evaluate Now'}
      </button>
    </div>
    ${evalSections || `<p class="muted">No domains or saved evaluations found for this candidate.</p>`}`;
}

// ── Domain add/remove ──────────────────────────────────────────
async function addDomain(candidateId) {
  const sel = document.getElementById(`new-domain-sel-${candidateId}`);
  const domainId = sel?.value;
  if (!domainId) { toast('Select a domain first', 'warning'); return; }
  try {
    await Candidates.addDomain(candidateId, domainId);
    toast('Domain assigned', 'success');
    // Reload and re-render in place
    const fresh = await Candidates.get(candidateId);
    viewingCandidate = fresh;
    renderViewModal(fresh);
    // Update list in background
    allCandidates = await Candidates.list();
    applyFilters();
  } catch (err) { toast(err.message, 'error'); }
}

async function removeDomain(candidateId, domainId, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    await Candidates.removeDomain(candidateId, domainId);
    toast('Domain removed', 'success');
    const fresh = await Candidates.get(candidateId);
    viewingCandidate = fresh;
    renderViewModal(fresh);
    allCandidates = await Candidates.list();
    applyFilters();
  } catch (err) {
    toast(err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Remove';
  }
}

// ── Evaluate Modal ─────────────────────────────────────────────
let evalCandidateId = null;

async function openEval(id) {
  evalCandidateId = id;
  document.getElementById('eval-title').textContent = 'Evaluate Candidate';
  document.getElementById('eval-subtitle').textContent = '';
  document.getElementById('eval-body').innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
  openModal('modal-eval');

  try {
    const c = await Candidates.get(id);
    document.getElementById('eval-title').textContent = `Evaluate — ${c.name}`;
    document.getElementById('eval-subtitle').innerHTML =
      `${badgeHtml(c.status)} · ${(c.candidate_domains||[]).length} domain(s)`;
    renderEvalModal(c);
  } catch (err) {
    document.getElementById('eval-body').innerHTML = `<p class="muted">${esc(err.message)}</p>`;
  }
}

function renderEvalModal(c) {
  currentEvalCandidate = c;
  currentEvalIndex = 0;
  currentEvalDrafts = {};
  renderEvalStep();
}

function renderEvalStep() {
  const c = currentEvalCandidate;
  if (!c) return;

  const candDomains = getCandidateEvalDomains(c);
  if (!candDomains.length) {
    document.getElementById('eval-body').innerHTML =
      `<div style="text-align:center;padding:var(--sp-6);">
        <p class="muted">This candidate is not assigned to any domain yet.</p>
        <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-eval');openView('${c.id}')">
          Assign Domain First
        </button>
      </div>`;
    document.getElementById('btn-next-domain').disabled = true;
    document.getElementById('btn-next-domain').textContent = 'Next Domain';
    return;
  }

  const cd = candDomains[Math.min(currentEvalIndex, candDomains.length - 1)];
  const domQuestions = criteriaByDomain[cd.domain_id] || [];
  const myEval = (c.evaluations || []).find(e => String(e.admin_id) === String(user.id) && String(e.domain_id) === String(cd.domain_id));
  const draft = currentEvalDrafts[cd.domain_id] || {};
  const domainName = cd.domains?.name || cd.domain_id;
  const isLast = currentEvalIndex >= candDomains.length - 1;

  const otherEvals = (c.evaluations || []).filter(e => String(e.admin_id) !== String(user.id) && String(e.domain_id) === String(cd.domain_id));
  const otherEvalsHtml = otherEvals.length
    ? `<div style="margin-top:var(--sp-3);padding-top:var(--sp-3);border-top:1px solid var(--border);">
        <div class="detail-label" style="margin-bottom:.4rem;">Other evaluations for this domain</div>
        ${otherEvals.map(oe => {
          const name = oe.users?.full_name || oe.users?.email || 'Admin';
          return `<div class="prev-eval-card" style="margin-bottom:var(--sp-2);">
            <div class="prev-eval-header">
              <div class="prev-eval-admin">
                <div class="prev-eval-avatar">${avatar(name)}</div>
                <strong>${esc(name)}</strong>
              </div>
              <div class="prev-eval-score">${oe.total_score} pts</div>
            </div>
            ${oe.remarks ? `<div class="prev-eval-remarks">"${esc(oe.remarks)}"</div>` : ''}
          </div>`;
        }).join('')}
      </div>`
    : '';

  if (!domQuestions.length) {
    document.getElementById('eval-body').innerHTML = `<div class="domain-eval-block">
      <div class="domain-eval-header">
        <div class="domain-eval-header-left">
          <div class="domain-dot"></div>
          <span class="domain-eval-title">${esc(domainName)}</span>
        </div>
        <span class="badge badge-pending">No questions</span>
      </div>
      <div class="domain-eval-body">
        <p class="muted" style="font-size:.83rem;margin:0;">No questions configured for this domain. Ask super admin to add domain questions.</p>
      </div>
    </div>`;
    document.getElementById('btn-next-domain').disabled = !candDomains.length || currentEvalIndex >= candDomains.length - 1;
    document.getElementById('btn-next-domain').textContent = isLast ? 'Final Domain' : 'Next Domain';
    return;
  }

  const questionList = domQuestions.map((q, qidx) =>
    `<div style="padding:.55rem .75rem;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:.84rem;margin-bottom:.4rem;">
      <strong>Q${qidx + 1}.</strong> ${esc(q.name)}
    </div>`
  ).join('');

  const existingOverall = Number(draft.overall_rating ?? myEval?.scores?.overall_rating ?? myEval?.overall_rating ?? myEval?.total_score ?? 0);
  const existingRemarks = draft.remarks ?? myEval?.remarks ?? '';
  const existingGeneral = draft.final_general_remarks ?? myEval?.scores?.final_general_remarks ?? '';

  const savedBadge = myEval || draft.overall_rating != null
    ? `<span class="badge badge-selected" style="font-size:.72rem;">✓ ${existingOverall} pts</span>`
    : `<span class="badge badge-pending" style="font-size:.72rem;">Not evaluated</span>`;

  document.getElementById('eval-body').innerHTML = `<div class="domain-eval-block" id="evblock-${cd.domain_id}">
    <div class="domain-eval-header">
      <div class="domain-eval-header-left">
        <div class="domain-dot"></div>
        <span class="domain-eval-title">${esc(domainName)}</span>
      </div>
      ${savedBadge}
    </div>
    <div class="domain-eval-body">
      <div class="muted" style="font-size:.78rem;margin-bottom:var(--sp-2);">Domain ${currentEvalIndex + 1} of ${candDomains.length}</div>
      <div style="margin-bottom:var(--sp-3);">
        <div class="detail-label" style="margin-bottom:.45rem;">Domain Questions</div>
        ${questionList}
      </div>
      <div class="form-group" style="margin-top:var(--sp-2);">
        <label style="font-size:.8rem;">Overall Rating (0 to 10)</label>
        <input type="number" id="overall-${cd.domain_id}" min="0" max="10" step="0.5" value="${existingOverall}" style="width:140px;" />
      </div>
      <div class="form-group" style="margin-top:var(--sp-3);">
        <label style="font-size:.8rem;">Remarks for ${esc(domainName)}</label>
        <textarea id="remarks-${cd.domain_id}" rows="3"
          placeholder="Strengths, weaknesses, overall impression…"
          style="width:100%;font-size:.85rem;">${esc(existingRemarks)}</textarea>
      </div>
      ${isLast ? `<div class="form-group" style="margin-top:var(--sp-3);">
        <label style="font-size:.8rem;">Final General Remarks (all domains)</label>
        <textarea id="general-remarks-${cd.domain_id}" rows="2"
          placeholder="Final recommendation regardless of domain"
          style="width:100%;font-size:.85rem;">${esc(existingGeneral)}</textarea>
      </div>` : ''}
      ${otherEvalsHtml}
    </div>
  </div>`;

  document.getElementById('btn-next-domain').disabled = isLast;
  document.getElementById('btn-next-domain').textContent = isLast ? 'Final Domain' : 'Next Domain';
}

function captureCurrentEvalDraft() {
  if (!currentEvalCandidate) return;
  const candDomains = currentEvalCandidate.candidate_domains || [];
  const cd = candDomains[currentEvalIndex];
  if (!cd) return;

  const overallEl = document.getElementById(`overall-${cd.domain_id}`);
  const remarksEl = document.getElementById(`remarks-${cd.domain_id}`);
  const generalEl = document.getElementById(`general-remarks-${cd.domain_id}`);

  currentEvalDrafts[cd.domain_id] = {
    overall_rating: parseFloat(overallEl?.value || '0'),
    remarks: remarksEl?.value?.trim() || '',
    final_general_remarks: generalEl?.value?.trim() || '',
  };
}

// ── Submit all evaluations ─────────────────────────────────────
document.getElementById('btn-submit-eval').addEventListener('click', async () => {
  const btn = document.getElementById('btn-submit-eval');
  if (!evalCandidateId) return;

  // Fetch the latest candidate to know which domains
  const c = await Candidates.get(evalCandidateId);
  const candDomains = getCandidateEvalDomains(c);
  captureCurrentEvalDraft();

  // Build evaluation payload for each domain that has questions
  const evaluationsList = [];
  let hasAnyQuestions = false;

  for (const cd of candDomains) {
    const domQuestions = criteriaByDomain[cd.domain_id] || [];
    if (!domQuestions.length) continue;
    hasAnyQuestions = true;

    const draft = currentEvalDrafts[cd.domain_id] || {};
    const overallValue = draft.overall_rating ?? document.getElementById(`overall-${cd.domain_id}`)?.value ?? '0';
    const overallRating = parseFloat(overallValue);
    if (Number.isNaN(overallRating) || overallRating < 0 || overallRating > 10) {
      toast('Overall rating must be between 0 and 10', 'warning');
      return;
    }

    const remarksValue = draft.remarks ?? document.getElementById(`remarks-${cd.domain_id}`)?.value?.trim() ?? '';
    const remarks = String(remarksValue).trim() || null;
    const generalValue = draft.final_general_remarks ?? document.getElementById(`general-remarks-${cd.domain_id}`)?.value?.trim() ?? '';
    const finalGeneralRemarks = String(generalValue).trim() || null;

    evaluationsList.push({
      candidate_id: evalCandidateId,
      domain_id:    cd.domain_id,
      scores: { overall_rating: overallRating },
      overall_rating: overallRating,
      remarks,
      final_general_remarks: finalGeneralRemarks,
    });
  }

  if (!hasAnyQuestions) { toast('No domains with questions to evaluate', 'warning'); return; }
  if (!evaluationsList.length) { toast('Nothing to save', 'warning'); return; }

  setLoading(btn, true, 'Saving…');
  try {
    const result = await Evaluations.submitMulti(evalCandidateId, evaluationsList);
    const saved  = result.saved || 0;
    const errors = result.errors || [];

    if (errors.length) {
      toast(`${saved} saved, ${errors.length} error(s): ${errors[0]?.error}`, 'warning');
    } else {
      toast(`Evaluations saved for ${saved} domain${saved !== 1 ? 's' : ''}!`, 'success');
    }
    closeModal('modal-eval');
    // Invalidate and reload
    Candidates.invalidateCache();
    allCandidates = await Candidates.list();
    applyFilters();
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    setLoading(btn, false, 'Save All Evaluations');
  }
});

const debouncedFilter = debounce(applyFilters, 250);
document.getElementById('search-input').addEventListener('input', debouncedFilter);
document.getElementById('filter-domain').addEventListener('change', applyFilters);
document.getElementById('filter-status').addEventListener('change', applyFilters);

    document.getElementById(id).value = '';
  });

});

document.getElementById('btn-next-domain').addEventListener('click', () => {
  if (!currentEvalCandidate) return;
  captureCurrentEvalDraft();
  const candDomains = currentEvalCandidate.candidate_domains || [];
  if (currentEvalIndex >= candDomains.length - 1) {
    toast('Final domain reached. Use Save All Evaluations when ready.', 'info');
    return;
  }
  currentEvalIndex += 1;
  renderEvalStep();
});

function getRefreshFn() {
  const app = window.OfflineApp || {};
  if (typeof app.refreshLocalCacheFromServer === 'function') return app.refreshLocalCacheFromServer.bind(app);
  if (typeof app.prepareOfflineMode === 'function') return app.prepareOfflineMode.bind(app);
  return null;
}

document.getElementById('btn-upload-server').addEventListener('click', async () => {
  const btn = document.getElementById('btn-upload-server');
  setLoading(btn, true, 'Uploading...');
  try {
    const hasPendingBeforeUpload = await window.OfflineApp.hasUnsyncedData();
    if (hasPendingBeforeUpload) {
      const shouldDownloadBackup = window.confirm('Pending local changes detected. Download a backup copy before upload? Click OK to download or Cancel to continue without downloading.');
      if (shouldDownloadBackup) {
        try {
          const bk = await window.OfflineApp.exportUnsyncedBackup();
          toast(`Backup exported (${bk.pendingParticipants || 0} participant changes, ${bk.pendingEvaluations || 0} evaluation changes).`, 'info', 5000);
        } catch (backupErr) {
          toast(`Could not export backup copy: ${backupErr?.message || 'Unknown error'}`, 'warning', 7000);
        }
      }
    }

    const result = await window.OfflineApp.syncUnsyncedToServer();
    const p = result?.participants?.uploaded || 0;
    const e = result?.evaluations?.uploaded || 0;
    const ps = result?.participants?.skipped || 0;
    const es = result?.evaluations?.skipped || 0;
    const pe = (result?.participants?.errors || []).length;
    const ee = (result?.evaluations?.errors || []).length;

    const stats = await window.OfflineApp.getLocalSyncStats();
    const pendingAfterUpload = Number(stats?.pending || 0);

    if (pe || ee || pendingAfterUpload > 0) {
      const firstErr = result?.participants?.errors?.[0]?.error || result?.evaluations?.errors?.[0]?.error || 'Unknown sync error';
      toast(`Upload partial: ${p} participant(s), ${e} evaluation(s). Pending local changes: ${pendingAfterUpload}. Skipped: ${ps + es}. Errors: ${pe + ee}. ${firstErr} Keep the backup copy safe.`, 'warning', 9000);
    } else {
      toast(`Upload complete: ${p} participant(s), ${e} evaluation(s). Skipped: ${ps + es}`, 'success');
      try {
        const refreshFn = getRefreshFn();
        if (!refreshFn) throw new Error('Refresh function unavailable. Hard refresh page once.');
        await refreshFn();
        toast('Refresh complete. Local IndexedDB/cache updated from server.', 'success');
      } catch (refreshErr) {
        toast(`Upload succeeded, but refresh failed: ${refreshErr?.message || 'Unknown error'}`, 'warning', 6000);
      }
    }
    allCandidates = await Candidates.list();
    applyFilters();
  } catch (err) {
    toast((err.message || 'Upload failed.') + ' Upload could not finish safely. Please export a backup copy from the Export Copy button.', 'error', 8000);
  } finally {
    setLoading(btn, false, 'Upload to Server');
  }
});

document.getElementById('btn-refresh-cache').addEventListener('click', async () => {
  const btn = document.getElementById('btn-refresh-cache');
  setLoading(btn, true, 'Refreshing...');
  try {
    const hasPending = await window.OfflineApp.hasUnsyncedData();
    if (hasPending) {
      toast('Unsaved local changes detected. Upload first. If upload fails, download backup copy before refresh.', 'warning', 7000);
      return;
    }

    const refreshFn = getRefreshFn();
    if (!refreshFn) throw new Error('Refresh function unavailable. Hard refresh page once.');
    const refreshed = await refreshFn();
    allCandidates = await Candidates.list();
    applyFilters();
    const cCount = refreshed?.candidates ?? 'latest';
    const dCount = refreshed?.domains ?? 'latest';
    const eCount = refreshed?.evaluations ?? 'latest';
    toast(`Refresh complete: ${cCount} candidates, ${dCount} domains, ${eCount} evaluations updated from server.`, 'success');
  } catch (err) {
    toast(err.message || 'Refresh failed', 'error');
  } finally {
    setLoading(btn, false, 'Refresh');
  }
});

document.getElementById('btn-export-backup').addEventListener('click', async () => {
  try {
    const result = await window.OfflineApp.exportUnsyncedBackup();
    toast(`Backup exported: ${result.participants} participants, ${result.evaluations} evaluations (pending: ${result.pendingParticipants || 0} participants, ${result.pendingEvaluations || 0} evaluations)`, 'success');
  } catch (err) {
    toast(err.message || 'Backup export failed', 'error');
  }
});

loadData();
</script>
</body>
