<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dashboard — Admin</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/tables.css" />
</head>
<body>
<div class="app-shell">
  <div id="sidebar-placeholder"></div>

  <header class="topbar">
    <span class="topbar-title">Dashboard</span>
  </header>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 id="welcome-heading">Welcome back</h1>
        <p id="domain-label">Loading domain info…</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-icon indigo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path d="M7 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM14.5 9a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5ZM1.615 16.428a1.224 1.224 0 0 1-.569-1.175 6.002 6.002 0 0 1 11.908 0c.058.467-.172.92-.57 1.174A9.953 9.953 0 0 1 7 18a9.953 9.953 0 0 1-5.385-1.572ZM14.5 16h-.106c.07-.297.088-.611.048-.933a7.47 7.47 0 0 0-1.588-3.755 4.502 4.502 0 0 1 5.874 2.636.818.818 0 0 1-.36.98A7.465 7.465 0 0 1 14.5 16Z"/></svg>
        </div>
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Assigned Candidates</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd"/></svg>
        </div>
        <div class="stat-value" id="stat-evaluated">—</div>
        <div class="stat-label">Evaluated</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm.75-13a.75.75 0 0 0-1.5 0v5c0 .414.336.75.75.75h4a.75.75 0 0 0 0-1.5h-3.25V5Z" clip-rule="evenodd"/></svg>
        </div>
        <div class="stat-value" id="stat-pending">—</div>
        <div class="stat-label">Pending Evaluation</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.661 2.237a.531.531 0 0 1 .678 0 11.947 11.947 0 0 0 7.078 2.749.5.5 0 0 1 .479.425c.069.52.104 1.05.104 1.589 0 5.162-3.26 9.563-7.834 11.256a.48.48 0 0 1-.332 0C5.26 16.564 2 12.163 2 7c0-.538.035-1.069.104-1.589a.5.5 0 0 1 .48-.425 11.947 11.947 0 0 0 7.077-2.749Z" clip-rule="evenodd"/></svg>
        </div>
        <div class="stat-value" id="stat-criteria">—</div>
        <div class="stat-label">Domain Questions</div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="card" style="margin-bottom:var(--sp-6)">
      <div class="card-header">
        <span class="card-title">Evaluation Progress</span>
        <span id="progress-text" style="font-size:.82rem;color:var(--text-muted)">0%</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <p style="font-size:.8rem;color:var(--text-muted);margin-top:var(--sp-3)">
        Candidates evaluated by you in your assigned domain
      </p>
    </div>

    <!-- Domain questions -->
    <div class="card" style="margin-bottom:var(--sp-6)">
      <div class="card-header">
        <span class="card-title">Domain Questions</span>
      </div>
      <div id="criteria-list">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Recent candidates -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Recent Candidates</span>
        <a href="candidates.html" class="btn btn-ghost btn-sm">View all →</a>
      </div>
      <div class="table-wrap" id="recent-table">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/sidebar.js"></script>
<script>
  const user = requireAuth(['admin', 'superadmin']);
  mountSidebar('admin');
  initSidebarUser();
  highlightNav();

  document.getElementById('welcome-heading').textContent = `Welcome, ${user.full_name || 'Admin'}`;

  async function loadDashboard() {
    try {
      const [candidates, domainList] = await Promise.all([
        Candidates.list(),
        Domains.list(),
      ]);

      const domain = domainList[0];
      document.getElementById('domain-label').textContent = domain
        ? `Managing domain: ${domain.name}`
        : 'No domain assigned yet — contact super admin';

      let criteria = [];
      if (domain) {
        criteria = await Domains.criteria(domain.id);
      }

      // Count my evaluations
      const myEvals = candidates.filter(c =>
        (c.evaluations || []).some(e => e.admin_id === user.id)
      ).length;

      const total   = candidates.length;
      const pending = total - myEvals;
      const pct     = total ? Math.round((myEvals / total) * 100) : 0;

      document.getElementById('stat-total').textContent    = total;
      document.getElementById('stat-evaluated').textContent = myEvals;
      document.getElementById('stat-pending').textContent   = pending;
      document.getElementById('stat-criteria').textContent  = criteria.length;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-text').textContent = pct + '%';

      renderCriteria(criteria);
      renderRecentTable(candidates.slice(0, 6));

    } catch (err) {
      toast(err.message, 'error');
    }
  }

  function renderCriteria(criteria) {
    const el = document.getElementById('criteria-list');
    if (!criteria.length) {
      el.innerHTML = '<p style="padding:var(--sp-4);font-size:.85rem;color:var(--text-muted)">No questions configured yet — contact super admin</p>';
      return;
    }
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:var(--sp-2);padding:var(--sp-2) 0">` +
      criteria.map(c => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:var(--sp-3) var(--sp-2);border-bottom:1px solid var(--border)">
          <span style="font-size:.88rem;font-weight:500">${esc(c.name)}</span>
          <span class="badge badge-admin">0 – ${c.max_score} pts</span>
        </div>`).join('') + `</div>`;
  }

  function renderRecentTable(candidates) {
    const el = document.getElementById('recent-table');
    if (!candidates.length) {
      renderEmpty(el, 'No candidates assigned', 'Ask super admin to assign candidates to your domain');
      return;
    }
    const rows = candidates.map(c => {
      const myEval = (c.evaluations || []).find(e => e.admin_id === user.id);
      return `<tr>
        <td>
          <strong>${esc(c.name)}</strong>
          <div style="font-size:.75rem;color:var(--text-muted)">${esc(c.email)}</div>
        </td>
        <td style="color:var(--text-secondary)">${esc(c.roll_number || '—')}</td>
        <td style="color:var(--text-secondary)">${esc(c.branch || '—')}</td>
        <td>${badgeHtml(c.status)}</td>
        <td>
          ${myEval
            ? `<span class="badge badge-selected">✓ ${myEval.total_score} pts</span>`
            : `<span class="badge badge-pending">Pending</span>`}
        </td>
        <td>
          <a href="candidates.html" class="btn btn-ghost btn-sm">Evaluate →</a>
        </td>
      </tr>`;
    }).join('');

    el.innerHTML = `<table>
      <thead>
        <tr>
          <th>Candidate</th><th>Roll No</th><th>Branch</th><th>Status</th><th>My Evaluation</th><th></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  loadDashboard();
</script>
</body>
</html>
